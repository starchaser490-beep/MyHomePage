<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>纳指科技七姐妹观点汇总</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app">

<!-- Header -->
<div class="header">
  <h1>🚀 纳指科技七姐妹</h1>
  <p class="subtitle">高胜率美股博主观点汇总 · 每日更新</p>
  <div class="badges">
    <span class="badge bl">📊 综合评分</span>
    <span class="badge gn">✅ 看多</span>
    <span class="badge yw">⚠️ 中立</span>
    <span class="badge rd">❌ 看空</span>
  </div>
  <div class="update-info" id="updateInfo">数据更新中...</div>
</div>

<!-- Tab -->
<div class="tabs">
  <button class="tab active" onclick="switchView('ranking',this)">🏆 综合排名</button>
  <button class="tab" onclick="switchView('detail',this)">📋 详细观点</button>
  <button class="tab" onclick="switchView('bloggers',this)">👤 博主列表</button>
</div>

<!-- 综合排名页 -->
<div class="section active" id="view-ranking">
  <div class="card">
    <div class="card-title"><div class="icon" style="background:rgba(59,130,246,.2)">🏆</div>综合评分排名</div>
    <p style="color:var(--tx2);font-size:0.85em">基于高胜率博主的看多/看空观点汇总</p>
  </div>

  <div id="rankingCards"></div>

  <div class="card">
    <div class="card-title"><div class="icon" style="background:rgba(16,185,129,.2)">📊</div>评分分布</div>
    <div class="chart-box">
      <canvas id="scoreChart"></canvas>
    </div>
  </div>
</div>

<!-- 详细观点页 -->
<div class="section" id="view-detail">
  <div id="stockDetailCards"></div>
</div>

<!-- 博主列表页 -->
<div class="section" id="view-bloggers">
  <div class="card">
    <div class="card-title"><div class="icon" style="background:rgba(139,92,246,.2)">👤</div>高胜率博主列表</div>
    <p style="color:var(--tx2);font-size:0.85em">来源：Twitter/X, 微博, 公众号等平台</p>
  </div>

  <div id="bloggerCards"></div>
</div>

</div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
